version: 0.2

phases:
  install:
    commands:
      - dnf update && dnf install -y libatomic
      - curl -fsSL https://get.pnpm.io/install.sh | sh -
      - source ~/.bashrc
      - (cd javascript && pnpm install)
  build:
    commands:
      - (cd javascript && pnpm build)

artifacts:
  files: "**/*"
